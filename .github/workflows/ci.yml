name: CI

on:
  push:
    branches: [main, production-ready, lockfile-hardening]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ailuu_test
          POSTGRES_USER: ailuu
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ailuu -d ailuu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      HOST: 127.0.0.1
      PORT: 3000
      PUBLIC_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://ailuu:test_password@127.0.0.1:5432/ailuu_test
      DATABASE_SSL: "false"
      TELEGRAM_MODE: disabled
      RUN_MIGRATIONS_ON_START: "false"
      RUN_SEED_ON_START: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Commit generated lockfile once
        if: github.ref_name == 'lockfile-hardening' || github.head_ref == 'lockfile-hardening'
        run: |
          if ! git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add package-lock.json
            git commit -m "chore: add npm lockfile"
            git push origin HEAD:lockfile-hardening
          fi
      - run: npm run check
      - run: npm test
      - run: npm run migrate
      - run: npm run seed
      - name: Application smoke test
        run: |
          node src/server.js > /tmp/ailuu.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID || true; cat /tmp/ailuu.log' EXIT
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ready >/dev/null; then break; fi
            sleep 1
          done
          node scripts/smoke-test.js
